<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsLens — Enterprise Value Operations Benchmark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#ffffff;
  --color-surface-offset:#f0ede8;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#6b6965;--color-text-faint:#b0afaa;
  --color-text-inverse:#f9f8f4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-active:#0f3638;
  --color-primary-highlight:#e0eeed;--color-primary-soft:#c8dedd;
  /* dimension accent palette */
  --d1:#01696f;--d1-soft:#e0eeed;
  --d2:#006494;--d2-soft:#ddeaf3;
  --d3:#7a39bb;--d3-soft:#ede6f7;
  --d4:#437a22;--d4-soft:#e0eedb;
  --d5:#964219;--d5-soft:#f2e8e0;
  --d6:#d19900;--d6-soft:#f5edcc;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.09);
  --shadow-lg:0 16px 40px oklch(0.2 0.01 80/0.14);
  --shadow-xl:0 24px 60px oklch(0.2 0.01 80/0.18);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;
  --radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --font-display:'Instrument Serif',Georgia,serif;
  --font-body:'Inter','Helvetica Neue',sans-serif;
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#232220;
  --color-surface-offset:#252422;--color-surface-dynamic:#2d2c2a;
  --color-divider:#2e2d2b;--color-border:#383735;
  --color-text:#cdccca;--color-text-muted:#8a8986;--color-text-faint:#5a5957;
  --color-text-inverse:#1c1b19;
  --color-primary:#4f98a3;--color-primary-hover:#3d828d;
  --color-primary-highlight:#1e3335;--color-primary-soft:#1e3335;
  --d1:#4f98a3;--d1-soft:#1c3537;
  --d2:#5591c7;--d2-soft:#1a2e44;
  --d3:#a86fdf;--d3-soft:#2d1f47;
  --d4:#6daa45;--d4-soft:#1e2e17;
  --d5:#bb653b;--d5-soft:#3a1f12;
  --d6:#e8af34;--d6-soft:#3a2d0f;
  --shadow-sm:0 1px 2px oklch(0 0 0/.25);
  --shadow-md:0 4px 12px oklch(0 0 0/.35);
  --shadow-lg:0 16px 40px oklch(0 0 0/.5);
  --shadow-xl:0 24px 60px oklch(0 0 0/.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);overflow-x:hidden}
img,svg{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a,button,[role="button"]{transition:color var(--transition),background var(--transition),box-shadow var(--transition),opacity var(--transition)}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ── LAYOUT ─────────────────────────────────────────── */
.app{display:flex;flex-direction:column;min-height:100dvh}
header{position:sticky;top:0;z-index:100;background:var(--color-surface);border-bottom:1px solid var(--color-divider);padding:var(--space-3) var(--space-6)}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:1600px;margin:0 auto;gap:var(--space-4)}
.logo{display:flex;align-items:center;gap:var(--space-3);text-decoration:none;color:inherit;flex-shrink:0}
.logo-mark{width:32px;height:32px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1.1}
.logo-name{font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;letter-spacing:-.01em}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);font-weight:400}
.header-actions{display:flex;align-items:center;gap:var(--space-2)}
.filter-bar{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;flex:1;justify-content:center}
.filter-btn{padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:500;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted);white-space:nowrap;transition:all var(--transition)}
.filter-btn:hover{border-color:var(--color-primary);color:var(--color-primary)}
.filter-btn.active{background:var(--color-primary);color:var(--color-text-inverse);border-color:var(--color-primary)}
.btn-icon{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted)}
.btn-icon:hover{border-color:var(--color-primary);color:var(--color-primary)}

main{flex:1;padding:var(--space-6);max-width:1600px;margin:0 auto;width:100%}

/* ── MATRIX ─────────────────────────────────────────── */
.matrix-header{display:grid;grid-template-columns:220px repeat(4,1fr);gap:var(--space-2);margin-bottom:var(--space-2);padding:0 0 0 0;position:sticky;top:57px;z-index:50;background:var(--color-bg);padding-bottom:var(--space-2)}
.col-label{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-faint);text-align:center;padding:var(--space-2) var(--space-3)}
.col-label.col-num{color:var(--color-primary);font-size:var(--text-xs)}
.matrix-body{display:flex;flex-direction:column;gap:var(--space-2)}
.dimension-row{display:grid;grid-template-columns:220px repeat(4,1fr);gap:var(--space-2);align-items:stretch}
.dim-label-cell{display:flex;flex-direction:column;justify-content:center;padding:var(--space-4) var(--space-4);border-radius:var(--radius-lg);background:var(--color-surface);border:1px solid var(--color-border);gap:var(--space-1);min-height:120px}
.dim-icon{width:28px;height:28px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-2)}
.dim-icon svg{width:15px;height:15px}
.dim-name{font-size:var(--text-sm);font-weight:600;line-height:1.25;color:var(--color-text)}
.dim-count{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-1)}

/* ── PRACTICE CELL ───────────────────────────────────── */
.practice-cell{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4);cursor:pointer;display:flex;flex-direction:column;gap:var(--space-2);transition:all var(--transition);min-height:120px;position:relative;overflow:hidden}
.practice-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--dim-color,var(--color-primary));opacity:0;transition:opacity var(--transition)}
.practice-cell:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:oklch(from var(--color-text) l c h/.15)}
.practice-cell:hover::before{opacity:1}
.practice-cell.active{border-color:var(--dim-color,var(--color-primary));box-shadow:0 0 0 2px oklch(from var(--dim-color,var(--color-primary)) l c h/.2),var(--shadow-md)}
.practice-cell.active::before{opacity:1}
.practice-cell.dimmed{opacity:.4}
.cell-maturity{display:inline-flex;align-items:center;gap:4px;padding:2px var(--space-2);border-radius:var(--radius-full);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;width:fit-content}
.m-leading{background:color-mix(in oklch,var(--dim-color,#01696f) 15%,transparent);color:var(--dim-color,var(--color-primary))}
.m-established{background:var(--color-surface-offset);color:var(--color-text-muted)}
.m-emerging{background:color-mix(in oklch,var(--color-gold,#d19900) 12%,transparent);color:color-mix(in oklch,var(--color-gold,#d19900) 80%,var(--color-text))}
.cell-title{font-size:var(--text-sm);font-weight:600;line-height:1.3;color:var(--color-text)}
.cell-desc{font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.5;flex:1}
.cell-arrow{position:absolute;bottom:var(--space-3);right:var(--space-3);width:20px;height:20px;border-radius:var(--radius-full);background:var(--color-surface-offset);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--transition)}
.practice-cell:hover .cell-arrow{opacity:1}

/* ── DRAWER ──────────────────────────────────────────── */
.drawer-overlay{position:fixed;inset:0;background:oklch(0.15 0.005 80/.4);z-index:200;opacity:0;pointer-events:none;transition:opacity var(--transition)}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;height:100dvh;width:min(480px,100vw);background:var(--color-surface-2);border-left:1px solid var(--color-border);z-index:201;transform:translateX(100%);transition:transform 360ms cubic-bezier(0.16,1,0.3,1);overflow-y:auto;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-header{padding:var(--space-5) var(--space-6);border-bottom:1px solid var(--color-divider);display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);position:sticky;top:0;background:var(--color-surface-2);z-index:1}
.drawer-title-group{display:flex;flex-direction:column;gap:var(--space-2)}
.drawer-dim-badge{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;width:fit-content}
.drawer-title{font-family:var(--font-display);font-size:var(--text-xl);line-height:1.15;font-weight:400}
.drawer-close{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);border:1px solid var(--color-border);color:var(--color-text-muted)}
.drawer-close:hover{background:var(--color-surface-offset);color:var(--color-text)}
.drawer-body{padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-6);flex:1}
.drawer-section{}
.drawer-section-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--color-text-faint);margin-bottom:var(--space-3)}
.drawer-text{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.65}
.impact-card{background:var(--color-surface-offset);border-radius:var(--radius-lg);padding:var(--space-4);display:flex;gap:var(--space-3);align-items:flex-start}
.impact-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.impact-icon svg{width:18px;height:18px}
.impact-text{font-size:var(--text-sm);font-weight:600;color:var(--color-text);line-height:1.4}
.impact-sub{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px}
.tools-grid{display:flex;flex-wrap:wrap;gap:var(--space-2)}
.tool-chip{padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);background:var(--color-surface-offset);border:1px solid var(--color-border);font-size:var(--text-xs);color:var(--color-text-muted);font-weight:500}
.adopters-list{display:flex;flex-direction:column;gap:var(--space-2)}
.adopter-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3);background:var(--color-surface-offset);border-radius:var(--radius-md)}
.adopter-dot{width:8px;height:8px;border-radius:var(--radius-full);flex-shrink:0}
.adopter-name{font-size:var(--text-sm);font-weight:600;color:var(--color-text)}
.adopter-note{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:1px}
.drawer-nav{padding:var(--space-4) var(--space-6);border-top:1px solid var(--color-divider);display:flex;justify-content:space-between;gap:var(--space-2);background:var(--color-surface-2);position:sticky;bottom:0}
.nav-btn{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--color-border);font-size:var(--text-sm);font-weight:500;color:var(--color-text-muted)}
.nav-btn:hover:not(:disabled){background:var(--color-surface-offset);color:var(--color-text);border-color:oklch(from var(--color-text) l c h/.2)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── LEGEND ──────────────────────────────────────────── */
.legend{display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap;margin-bottom:var(--space-4)}
.legend-item{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--color-text-muted)}
.legend-dot{width:8px;height:8px;border-radius:2px}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--color-divider);border-radius:var(--radius-full)}
::-webkit-scrollbar-thumb:hover{background:var(--color-border)}

/* ── RESPONSIVE ──────────────────────────────────────── */
@media(max-width:900px){
  .matrix-header,.dimension-row{grid-template-columns:160px repeat(4,1fr)}
  .dim-name{font-size:11px}
  .practice-cell{padding:var(--space-3)}
  .cell-title{font-size:11px}
  .cell-desc{display:none}
}
@media(max-width:650px){
  .filter-bar{display:none}
  .matrix-header{grid-template-columns:120px repeat(4,1fr)}
  .dimension-row{grid-template-columns:120px repeat(4,1fr)}
  .dim-label-cell{padding:var(--space-2)}
  .dim-icon{display:none}
  .dim-count{display:none}
  main{padding:var(--space-3)}
  header{padding:var(--space-2) var(--space-3)}
}
</style>
</head>

<!-- MAIN -->
<main>

    <div class="legend-item"><div class="legend-dot" style="background:#d19900"></div>Emerging</div>
    <span style="font-size:var(--text-xs);color:var(--color-text-faint);margin-left:auto">Click any cell to explore the practice →</span>
  </div>

  <!-- Column headers -->
  <div class="matrix-header" id="matrixHeader">
    <div class="col-label">Dimension</div>
    <div class="col-label col-num">Practice 1</div>
    <div class="col-label col-num">Practice 2</div>
    <div class="col-label col-num">Practice 3</div>
    <div class="col-label col-num">Practice 4</div>
  </div>

  <!-- Matrix rows -->
  <div class="matrix-body" id="matrixBody"></div>
</main>

</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="overlay" role="presentation"></div>
<aside class="drawer" id="drawer" role="complementary" aria-label="Practice detail">
  <div class="drawer-header">
    <div class="drawer-title-group">
      <div class="drawer-dim-badge" id="drawerBadge"></div>
      <h2 class="drawer-title" id="drawerTitle"></h2>
    </div>
    <button class="drawer-close" id="drawerClose" aria-label="Close panel">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-nav">
    <button class="nav-btn" id="navPrev">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      Previous
    </button>
    <button class="nav-btn" id="navNext">
      Next
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</aside>

const ALL_PRACTICES = [];
DIMENSIONS.forEach((dim,di)=>{
  dim.practices.forEach((p,pi)=>{
    ALL_PRACTICES.push({...p,dimId:di,dimName:dim.name,dimKey:dim.key,practiceIndex:pi});
  });
});

function getDimColor(key){ return getComputedStyle(document.documentElement).getPropertyValue('--'+key).trim(); }
function getDimSoft(key){ return getComputedStyle(document.documentElement).getPropertyValue('--'+key+'-soft').trim(); }
function maturityClass(m){ return m==='leading'?'m-leading':m==='established'?'m-established':'m-emerging'; }
function maturityLabel(m){ return m==='leading'?'* Leading':m==='established'?'Established':'? Emerging'; }

// ?? BUILD MATRIX ????????????????????????????????????????
function buildMatrix(){
  const body = document.getElementById('matrixBody');
  body.innerHTML='';
  DIMENSIONS.forEach((dim,di)=>{
    const row = document.createElement('div');
    row.className='dimension-row';
    row.dataset.dim=di;

    // Dimension label cell
    const lc = document.createElement('div');
    lc.className='dim-label-cell';
    lc.style.setProperty('--dim-color','var(--'+dim.key+')');
    lc.style.borderTop='2px solid var(--'+dim.key+')';
    lc.innerHTML=`
      <div class="dim-icon" style="background:var(--${dim.key}-soft);color:var(--${dim.key})">
        ${dim.icon}
      </div>
      <div class="dim-name">${dim.name}</div>
      <div class="dim-count">${dim.practices.length} practices</div>`;
    row.appendChild(lc);

    // Practice cells
    dim.practices.forEach((p,pi)=>{
      const globalIdx = ALL_PRACTICES.findIndex(x=>x.dimId===di&&x.practiceIndex===pi);
      const cell = document.createElement('div');
      cell.className='practice-cell';
      cell.style.setProperty('--dim-color','var(--'+dim.key+')');
      cell.dataset.global=globalIdx;
      cell.setAttribute('role','button');
      cell.setAttribute('tabindex','0');
      cell.setAttribute('aria-label',`${p.title} - click for details`);
      cell.innerHTML=`
        <span class="cell-maturity ${maturityClass(p.maturity)}">${maturityLabel(p.maturity)}</span>
        <div class="cell-title">${p.title}</div>
        <div class="cell-desc">${p.desc.slice(0,90)}?</div>
        <div class="cell-arrow">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>`;
      cell.addEventListener('click',()=>openDrawer(globalIdx));
      cell.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openDrawer(globalIdx);}});
      row.appendChild(cell);
    });

    body.appendChild(row);
  });
}

let currentGlobal = -1;
const overlay = document.getElementById('overlay');
const drawer = document.getElementById('drawer');
const drawerTitle = document.getElementById('drawerTitle');
const drawerBadge = document.getElementById('drawerBadge');
const drawerBody = document.getElementById('drawerBody');
const navPrev = document.getElementById('navPrev');
const navNext = document.getElementById('navNext');

function openDrawer(idx){
  currentGlobal=idx;
  renderDrawer(idx);
  drawer.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  // Highlight cell
  document.querySelectorAll('.practice-cell').forEach(c=>{
    c.classList.toggle('active',+c.dataset.global===idx);
    c.classList.toggle('dimmed',+c.dataset.global!==idx);
  });
}

function closeDrawer(){
  drawer.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow='';
  document.querySelectorAll('.practice-cell').forEach(c=>{
    c.classList.remove('active','dimmed');
  });
  currentGlobal=-1;
}

function renderDrawer(idx){
  const p = ALL_PRACTICES[idx];
  const dimKey = p.dimKey;
  drawerBadge.textContent = p.dimName;
  drawerBadge.style.background='var(--'+dimKey+'-soft)';
  drawerBadge.style.color='var(--'+dimKey+')';
  drawerTitle.textContent = p.title;

  const matBadge = `<span class="cell-maturity ${maturityClass(p.maturity)}" style="--dim-color:var(--${dimKey})">${maturityLabel(p.maturity)}</span>`;

  const adoptorsHtml = p.adopters.map(a=>`
    <div class="adopter-item">
      <div class="adopter-dot" style="background:var(--${dimKey})"></div>
      <div>
        <div class="adopter-name">${a.name}</div>
        <div class="adopter-note">${a.note}</div>
      </div>
    </div>`).join('');

  const toolsHtml = p.tools.map(t=>`<span class="tool-chip">${t}</span>`).join('');

  drawerBody.innerHTML=`
    <div style="display:flex;gap:var(--space-3);align-items:center;flex-wrap:wrap">
      ${matBadge}
      <span style="font-size:var(--text-xs);color:var(--color-text-faint)">${p.dimName}</span>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-label">What it is</div>
      <p class="drawer-text">${p.desc}</p>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-label">Measured impact</div>
      <div class="impact-card">
        <div class="impact-icon" style="background:var(--${dimKey}-soft);color:var(--${dimKey})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        </div>
        <div>
          <div class="impact-text">${p.impact}</div>
          <div class="impact-sub">${p.impactSub}</div>
        </div>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-label">Tools & platforms</div>
      <div class="tools-grid">${toolsHtml}</div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-label">Who is adopting it</div>
      <div class="adopters-list">${adoptorsHtml}</div>
    </div>`;

  navPrev.disabled = idx===0;
  navNext.disabled = idx===ALL_PRACTICES.length-1;
}

document.getElementById('drawerClose').addEventListener('click',closeDrawer);
overlay.addEventListener('click',closeDrawer);
navPrev.addEventListener('click',()=>{ if(currentGlobal>0) openDrawer(currentGlobal-1); });
navNext.addEventListener('click',()=>{ if(currentGlobal<ALL_PRACTICES.length-1) openDrawer(currentGlobal+1); });
document.addEventListener('keydown',e=>{
  if(!drawer.classList.contains('open')) return;
  if(e.key==='Escape') closeDrawer();
  if(e.key==='ArrowRight'&&currentGlobal<ALL_PRACTICES.length-1) openDrawer(currentGlobal+1);
  if(e.key==='ArrowLeft'&&currentGlobal>0) openDrawer(currentGlobal-1);
});

document.getElementById('filterBar').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const f=btn.dataset.filter;
  document.querySelectorAll('.dimension-row').forEach(r=>{
    if(f==='all') r.style.display='';
    else r.style.display=r.dataset.dim===f?'':'none';
  });
  if(drawer.classList.contains('open')) closeDrawer();
});

  const setIcon=()=>{ t.innerHTML=d==='dark'?sunSvg:moonSvg; t.setAttribute('aria-label','Switch to '+(d==='dark'?'light':'dark')+' mode'); };
